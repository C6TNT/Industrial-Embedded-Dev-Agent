name: Quick Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quick-check:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run quick local validation bundle
        run: python -m industrial_embedded_dev_agent check
