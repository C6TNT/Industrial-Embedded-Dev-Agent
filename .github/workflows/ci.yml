name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  local-validation:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run default local validation bundle
        run: python -m industrial_embedded_dev_agent check

      - name: Run focused RAG validation bundle
        run: python -m industrial_embedded_dev_agent check --include-rag --rag-type tool_safety
