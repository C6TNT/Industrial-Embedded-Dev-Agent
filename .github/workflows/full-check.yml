name: Full Check

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  full-check:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run pre-push static gate
        run: python -m industrial_embedded_dev_agent tools pre-push-check --skip-local-checks

      - name: Run quick validation bundle
        run: python -m industrial_embedded_dev_agent check --no-write-summary

      - name: Run full validation bundle
        run: python -m industrial_embedded_dev_agent check --include-offline --include-rag --rag-type tool_safety --no-write-summary
